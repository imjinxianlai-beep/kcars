<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Cars CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#D85A30">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="K-Cars CRM">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" href="/logo.png">
  <script type="module" crossorigin src="/assets/index-u_2mSLi7.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DVUS8I_3.css">
</head>
<body>
  <div id="root"></div>

  <script>
    // Nuke any lingering Service Workers from previous PWA builds
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()))
    }
    if (window.caches) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)))
    }

    // Auto-recover from Vite 504: if React hasn't mounted within 4s, reload.
    // Retries up to 3 times with increasing delays, then stops to avoid infinite loops.
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      var _attempts = parseInt(sessionStorage.getItem('_vite_recover') || '0')
      if (_attempts < 3) {
        setTimeout(function() {
          if (!document.getElementById('root').hasChildNodes()) {
            sessionStorage.setItem('_vite_recover', _attempts + 1)
            location.reload()
          } else {
            sessionStorage.removeItem('_vite_recover')
          }
        }, 4000 + _attempts * 2000)
      } else {
        sessionStorage.removeItem('_vite_recover')
      }
    }
  </script>
</body>
</html>
